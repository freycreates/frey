<style>
:root{
    color-scheme: light dark;
    --hot-pink:#ff1598;
    --violet:#824fff;
    --ink:#17141d;
    --muted:#69616f;
    --line:rgba(130,79,255,.18);
    --panel:rgba(255,255,255,.58);
    --panel-strong:rgba(255,255,255,.94);
    --shadow:0 24px 80px rgba(28,10,53,.22);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    font-family:"Open Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
        radial-gradient(circle at 12% 10%, rgba(255,21,152,.28), transparent 32rem),
        radial-gradient(circle at 88% 18%, rgba(130,79,255,.28), transparent 30rem),
        linear-gradient(145deg,#fff 0%,#fff7fb 44%,#f2edff 100%);
    display:grid;
    place-items:center;
    padding:32px 16px;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:-45%;
    z-index:-1;
    background:
        radial-gradient(circle at 16% 22%, rgba(255,21,152,.86), transparent 32%),
        radial-gradient(circle at 84% 18%, rgba(130,79,255,.86), transparent 34%),
        radial-gradient(circle at 46% 84%, rgba(0,196,204,.52), transparent 30%),
        radial-gradient(circle at 80% 90%, rgba(255,21,152,.48), transparent 34%);
    filter:blur(30px);
    opacity:1;
    animation:floatGlow 9s ease-in-out infinite alternate;
}

body::after{
    content:"";
    position:fixed;
    inset:-25%;
    z-index:-1;
    background:
        conic-gradient(from 120deg at 50% 50%, transparent 0deg, rgba(255,21,152,.28) 70deg, rgba(130,79,255,.32) 150deg, transparent 250deg, rgba(0,196,204,.2) 320deg, transparent 360deg);
    filter:blur(46px);
    mix-blend-mode:multiply;
    animation:slowSpin 14s linear infinite;
}

@keyframes floatGlow{
    0%{ transform:translate3d(-6%,-8%,0) scale(1) rotate(0deg); }
    50%{ transform:translate3d(5%,6%,0) scale(1.18) rotate(90deg); }
    100%{ transform:translate3d(-2%,10%,0) scale(1.05) rotate(-26deg); }
}

@keyframes slowSpin{
    to{ transform:rotate(360deg); }
}

.card{
    width:min(100%,520px);
    position:relative;
    overflow:visible;
    border:1px solid rgba(255,255,255,.7);
    border-radius:24px;
    background:var(--panel);
    box-shadow:var(--shadow);
    backdrop-filter:blur(22px);
}

.card-inner{
    padding:22px 30px 30px;
    text-align:center;
}

.next-card{
    margin:0 auto 10px;
    padding:0;
    display:grid;
    justify-items:center;
    align-items:center;
    gap:5px;
    border:0;
    border-radius:0;
    background:transparent;
    box-shadow:none;
    text-align:center;
}

.next-heading{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    padding:0;
    color:var(--hot-pink);
    background:transparent;
    box-shadow:none;
}

.next-label{
    color:var(--hot-pink);
    font-size:16px;
    font-weight:800;
    text-transform:uppercase;
    text-shadow:0 0 14px rgba(255,21,152,.28);
}

.next-eq{
    height:14px;
    display:flex;
    align-items:flex-end;
    gap:2px;
}

.next-eq span{
    width:3px;
    min-height:4px;
    border-radius:999px;
    background:linear-gradient(180deg,var(--hot-pink),var(--violet));
    animation:nextEq .9s infinite ease-in-out;
}

.next-eq span:nth-child(2){ animation-delay:.12s; }
.next-eq span:nth-child(3){ animation-delay:.24s; }
.next-eq span:nth-child(4){ animation-delay:.36s; }

@keyframes nextEq{
    0%,100%{ height:4px; opacity:.55; }
    50%{ height:14px; opacity:1; }
}

.next-separator{
    color:rgba(130,79,255,.58);
    font-size:11px;
    font-weight:800;
}

.next-date-inline{
    color:var(--ink);
    font-size:13.5px;
    font-weight:800;
    text-transform:uppercase;
    white-space:nowrap;
}

.next-venue{
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:var(--ink);
    font-size:13.5px;
    font-weight:800;
}

.divider{
    width:min(100%,300px);
    height:1px;
    margin:0 auto 12px;
    background:linear-gradient(90deg, transparent, rgba(255,21,152,.22), rgba(130,79,255,.24), transparent);
}

.identity{
    width:min(100%,250px);
    margin:0 auto 14px;
    display:grid;
    justify-items:center;
    gap:4px;
}

.portrait-stage{
    width:min(100%,126px);
    aspect-ratio:1;
    position:relative;
    display:grid;
    place-items:center;
    isolation:isolate;
}

.portrait-stage::before{
    content:none;
}

.portrait{
    width:100%;
    display:block;
    margin:0;
    position:relative;
    z-index:3;
}

.wordmark{
    width:min(100%,200px);
    display:block;
    position:relative;
    z-index:2;
}

.subtitle{
    margin-bottom:8px;
    color:var(--ink);
    font-size:13px;
    font-weight:800;
}

.bio{
    max-width:420px;
    margin:0 auto 16px;
    color:var(--muted);
    font-size:13px;
    line-height:1.65;
}

.actions{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:10px;
    max-width:430px;
    margin:0 auto 20px;
}

.btn{
    min-height:44px;
    padding:0 13px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    border:0;
    border-radius:999px;
    color:#fff;
    background:linear-gradient(135deg,var(--hot-pink),var(--violet));
    box-shadow:0 10px 24px rgba(130,79,255,.22);
    text-decoration:none;
    font-size:13px;
    font-weight:800;
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

.btn-mix{
    background:linear-gradient(135deg,#ff5500,var(--hot-pink));
}

.btn-booking{
    background:linear-gradient(135deg,var(--hot-pink),var(--violet));
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 30px rgba(130,79,255,.3);
    filter:saturate(1.08);
}

.btn:focus-visible,
.past-toggle:focus-visible{
    outline:3px solid rgba(255,21,152,.35);
    outline-offset:3px;
}

.icon{
    width:16px;
    height:16px;
    flex:0 0 auto;
    fill:currentColor;
}

.gigs{
    margin-top:18px;
    padding-top:18px;
    border-top:1px solid var(--line);
    text-align:left;
}

.section-title,
.past-toggle{
    width:100%;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    border:0;
    background:transparent;
    color:var(--violet);
    font:inherit;
    font-size:13px;
    font-weight:800;
    text-transform:uppercase;
}

.past-toggle{
    cursor:pointer;
}

.chevron{
    width:14px;
    height:14px;
    transition:transform .2s ease;
}

.past-toggle[aria-expanded="true"] .chevron{
    transform:rotate(180deg);
}

.gig-list{
    display:grid;
    gap:8px;
}

.gig{
    display:grid;
    grid-template-columns:62px minmax(0,1fr) auto;
    gap:10px;
    align-items:start;
    padding:10px 12px;
    border:1px solid rgba(130,79,255,.12);
    border-radius:8px;
    background:rgba(255,255,255,.48);
    color:var(--muted);
    font-size:14px;
    transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
}

.gig:hover,
.gig:focus-within{
    transform:translateY(-2px);
    border-color:rgba(130,79,255,.3);
    background:rgba(255,255,255,.72);
    box-shadow:0 10px 24px rgba(28,10,53,.09);
}

.gig-main{
    min-width:0;
}

.venue{
    display:block;
    color:var(--muted);
}

.gig-actions{
    display:flex;
    gap:6px;
    justify-self:end;
}

.mini-link{
    min-width:42px;
    min-height:28px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:0 9px;
    border:1px solid rgba(130,79,255,.2);
    border-radius:999px;
    color:var(--violet);
    background:rgba(255,255,255,.42);
    text-decoration:none;
    font-size:11px;
    font-weight:800;
    line-height:1;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
}

.mini-link:hover{
    transform:translateY(-1px);
    border-color:rgba(130,79,255,.28);
    background:rgba(255,255,255,.68);
}

.mini-link:focus-visible{
    outline:3px solid rgba(130,79,255,.28);
    outline-offset:3px;
}

.date{
    color:var(--violet);
    font-weight:800;
    white-space:nowrap;
}

#past{
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:max-height .45s ease, opacity .35s ease;
}

#past.open{
    max-height:900px;
    opacity:1;
}

.empty{
    color:var(--muted);
    text-align:center;
    font-size:13px;
}

@media (prefers-color-scheme: dark){
    :root{
        --ink:#f8f4ff;
        --muted:#c8bdd3;
        --line:rgba(255,255,255,.16);
        --panel:rgba(18,16,24,.82);
        --panel-strong:rgba(22,19,29,.95);
        --shadow:0 24px 80px rgba(0,0,0,.42);
    }

    body{
        background:
            radial-gradient(circle at 12% 10%, rgba(255,21,152,.26), transparent 30rem),
            radial-gradient(circle at 88% 18%, rgba(130,79,255,.34), transparent 30rem),
            linear-gradient(145deg,#08070b 0%,#14101d 54%,#0a0710 100%);
    }

    .card{
        border-color:rgba(255,255,255,.12);
    }

    :root{
        --panel:rgba(18,16,24,.56);
    }

    .gig{
        background:rgba(255,255,255,.055);
        border-color:rgba(255,255,255,.1);
    }

    .gig:hover,
    .gig:focus-within{
        background:rgba(255,255,255,.095);
        border-color:rgba(255,255,255,.24);
        box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .mini-link{
        background:rgba(255,255,255,.07);
        border-color:rgba(255,255,255,.14);
    }

    .mini-link:hover{
        background:rgba(255,255,255,.09);
        border-color:rgba(255,255,255,.22);
    }
}

@media (max-width:520px){
    body{
        padding:18px 12px;
        align-items:start;
    }

    .card{
        border-radius:20px;
    }

    .card-inner{
        padding:14px 18px 22px;
    }

    .next-card{
        gap:4px;
        padding:0;
    }

    .next-label{
        font-size:15px;
    }

    .next-venue{
        font-size:12.5px;
    }

    .identity{
        width:min(100%,178px);
        margin-bottom:12px;
    }

    .portrait-stage{
        width:min(100%,102px);
    }

    .wordmark{
        width:min(100%,156px);
    }

    .actions{
        grid-template-columns:repeat(2,minmax(0,1fr));
        max-width:290px;
        gap:8px;
        margin-bottom:18px;
    }

    .btn{
        min-height:40px;
        font-size:12px;
        gap:7px;
        padding:0 10px;
    }

    .btn-booking{
        grid-column:1 / -1;
    }

    .bio{
        font-size:12.5px;
        margin-bottom:14px;
    }

    .gig{
        grid-template-columns:54px 1fr;
        padding:9px 10px;
        font-size:13px;
    }

    .gig-actions{
        grid-column:2;
        justify-self:start;
        margin-top:3px;
    }
}

@media (prefers-reduced-motion: reduce){
    html{
        scroll-behavior:auto;
    }

    *,
    *::before,
    *::after{
        animation-duration:.01ms !important;
        animation-iteration-count:1 !important;
        transition-duration:.01ms !important;
    }
}
</style>
</head>

    { date:"2026-02-14", venue:"FERRY, Rotterdam" },
    { date:"2026-02-09", venue:"FERRY, Rotterdam" },
    { date:"2026-02-02", venue:"FERRY, Rotterdam" },
    { date:"2026-01-10", venue:"NYX, Amsterdam" },
    { date:"2026-06-19", venue:"FERRY, Rotterdam" },
    { date:"2026-05-29", venue:"FERRY, Rotterdam" },
    { date:"2026-05-08", venue:"NYX, Amsterdam" },
    { date:"2026-04-03", venue:"Rabbit's Hole, Singapore" },
    { date:"2026-03-28", venue:"NYX, Amsterdam" }
];

const today = new Date();
today.setHours(0,0,0,0);

function parseDate(dateText){
    const [year, month, day] = dateText.split("-").map(Number);
    return new Date(year, month - 1, day);
}

function formatDate(dateText){
    return new Intl.DateTimeFormat("en-GB", { day:"numeric", month:"short" }).format(parseDate(dateText));
}

function formatShortDate(dateText){
    return new Intl.DateTimeFormat("en-GB", { day:"numeric", month:"short" }).format(parseDate(dateText)).toUpperCase();
}

function createGig(gig){
    const row = document.createElement("div");
    row.className = "gig";

    const date = document.createElement("span");
    date.className = "date";
    date.textContent = formatDate(gig.date);

    const main = document.createElement("span");
    main.className = "gig-main";

    const venue = document.createElement("span");
    venue.className = "venue";
    venue.textContent = gig.venue;

    const actions = document.createElement("span");
    actions.className = "gig-actions";

    if (gig.eventUrl) {
        const event = document.createElement("a");
        event.className = "mini-link";
        event.href = gig.eventUrl;
        event.target = "_blank";
        event.rel = "noopener noreferrer";
        event.textContent = "Event";
        event.setAttribute("aria-label", `Open event page for ${gig.venue}`);
        actions.appendChild(event);
    }

    const map = document.createElement("a");
    map.className = "mini-link";
    map.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(gig.venue)}`;
    map.target = "_blank";
    map.rel = "noopener noreferrer";
    map.textContent = "Map";
    map.setAttribute("aria-label", `Open ${gig.venue} on Google Maps`);
    actions.appendChild(map);

    main.appendChild(venue);
    row.append(date, main, actions);
    return row;
}

const sortedGigs = [...gigs].sort((a,b) => parseDate(a.date) - parseDate(b.date));
const upcoming = sortedGigs.filter(gig => parseDate(gig.date) >= today);
const past = sortedGigs.filter(gig => parseDate(gig.date) < today).reverse();

const nextDate = document.getElementById("nextDate");
const nextVenue = document.getElementById("nextVenue");

if (upcoming.length) {
    const nextGig = upcoming[0];
    nextDate.textContent = formatShortDate(nextGig.date);
    nextVenue.textContent = nextGig.venue;
} else {
    nextDate.textContent = "";
    nextVenue.textContent = "New dates coming soon";
}

const upcomingContainer = document.getElementById("upcoming");
if (upcoming.length) {
    upcoming.forEach(gig => upcomingContainer.appendChild(createGig(gig)));
} else {
    upcomingContainer.innerHTML = '<p class="empty">New dates coming soon.</p>';
}

const pastContainer = document.getElementById("past");
past.forEach(gig => pastContainer.appendChild(createGig(gig)));

const pastToggle = document.getElementById("pastToggle");
pastToggle.addEventListener("click", () => {
    const isOpen = pastContainer.classList.toggle("open");
    pastToggle.setAttribute("aria-expanded", String(isOpen));
});
</script>
</body>
</html>
